services:
  - type: web
    name: fracas-rams-api
    env: node
    region: singapore
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_INTEGRATIONS_GEMINI_BASE_URL
        sync: false
      - key: AI_INTEGRATIONS_GEMINI_API_KEY
        sync: false
